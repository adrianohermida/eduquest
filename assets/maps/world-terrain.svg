<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 100" preserveAspectRatio="xMidYMid">
  <!-- Repeating sandy terrain texture tile -->
  <defs>
    <pattern id="sandy" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <!-- Subtle pebble/grain texture -->
      <circle cx="12" cy="14" r="2.5" fill="rgba(180,140,80,0.08)"/>
      <circle cx="38" cy="8"  r="1.8" fill="rgba(160,120,70,0.07)"/>
      <circle cx="62" cy="22" r="3"   fill="rgba(180,140,80,0.06)"/>
      <circle cx="24" cy="40" r="2"   fill="rgba(200,160,90,0.07)"/>
      <circle cx="55" cy="50" r="2.5" fill="rgba(170,130,75,0.08)"/>
      <circle cx="10" cy="65" r="1.5" fill="rgba(160,120,70,0.06)"/>
      <circle cx="70" cy="68" r="2"   fill="rgba(180,140,80,0.07)"/>
      <circle cx="42" cy="72" r="1.8" fill="rgba(200,155,85,0.07)"/>
    </pattern>
  </defs>
  <rect width="440" height="100" fill="url(#sandy)"/>
</svg>
