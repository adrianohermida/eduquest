<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 570" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky-t" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="60%" stop-color="#3730a3"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="rock" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </linearGradient>
    <radialGradient id="glow-p" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="440" height="570" fill="url(#sky-t)"/>

  <!-- Stars -->
  <g fill="white">
    <circle cx="30"  cy="30"  r="1.5" opacity="0.8"/>
    <circle cx="80"  cy="15"  r="1"   opacity="0.7"/>
    <circle cx="140" cy="45"  r="1.5" opacity="0.9"/>
    <circle cx="200" cy="20"  r="1"   opacity="0.6"/>
    <circle cx="260" cy="50"  r="1.5" opacity="0.8"/>
    <circle cx="320" cy="10"  r="1"   opacity="0.7"/>
    <circle cx="380" cy="35"  r="1.5" opacity="0.85"/>
    <circle cx="420" cy="55"  r="1"   opacity="0.6"/>
    <circle cx="60"  cy="75"  r="1"   opacity="0.6"/>
    <circle cx="170" cy="80"  r="1.5" opacity="0.7"/>
    <circle cx="350" cy="70"  r="1"   opacity="0.65"/>
    <circle cx="410" cy="90"  r="1.5" opacity="0.75"/>
  </g>

  <!-- Nebula / aurora effect -->
  <ellipse cx="180" cy="100" rx="180" ry="60" fill="#7c3aed" opacity="0.12"/>
  <ellipse cx="300" cy="130" rx="140" ry="50" fill="#a855f7" opacity="0.10"/>

  <!-- Distant tower (center, epic) -->
  <g opacity="0.35" transform="translate(183, 60)">
    <!-- Base -->
    <rect x="22" y="100" width="30" height="80" fill="#1e1b4b"/>
    <!-- Mid section -->
    <rect x="18" y="70" width="38" height="35" fill="#2e1065"/>
    <!-- Upper -->
    <rect x="20" y="40" width="34" height="35" fill="#1e1b4b"/>
    <!-- Spire -->
    <polygon points="37,0 25,42 49,42" fill="#4c1d95"/>
    <!-- Window -->
    <ellipse cx="37" cy="75" rx="6" ry="9" fill="#a78bfa" opacity="0.7"/>
    <!-- Battlements -->
    <rect x="18" y="68" width="7" height="8" fill="#2e1065"/>
    <rect x="28" y="68" width="7" height="8" fill="#2e1065"/>
    <rect x="38" y="68" width="7" height="8" fill="#2e1065"/>
    <rect x="48" y="68" width="7" height="8" fill="#2e1065"/>
  </g>

  <!-- Magical portal glow (behind tower) -->
  <ellipse cx="220" cy="150" rx="55" ry="55" fill="url(#glow-p)" opacity="0.4"/>
  <ellipse cx="220" cy="150" rx="30" ry="30" fill="#7c3aed" opacity="0.15"/>

  <!-- Rocky terrain -->
  <g opacity="0.5">
    <!-- Left rocks -->
    <polygon points="0,430 50,320 100,430" fill="url(#rock)"/>
    <polygon points="20,430 80,340 130,430" fill="#3b0764" opacity="0.9"/>
    <polygon points="5,430 45,360 85,430" fill="#4c1d95" opacity="0.7"/>
    <!-- Right rocks -->
    <polygon points="310,440 370,330 430,440" fill="url(#rock)"/>
    <polygon points="340,440 390,350 440,440" fill="#3b0764" opacity="0.9"/>
    <polygon points="330,440 375,370 420,440" fill="#4c1d95" opacity="0.7"/>
  </g>

  <!-- Ground dark -->
  <ellipse cx="220" cy="510" rx="270" ry="100" fill="#2e1065" opacity="0.7"/>
  <rect x="0" y="530" width="440" height="40" fill="#1e1b4b" opacity="0.8"/>

  <!-- Crystal formations -->
  <g opacity="0.45">
    <!-- Left crystals -->
    <polygon points="75,395 85,340 95,395" fill="#a78bfa"/>
    <polygon points="88,398 100,352 112,398" fill="#c4b5fd"/>
    <polygon points="64,400 72,360 80,400" fill="#7c3aed"/>
    <!-- Right crystals -->
    <polygon points="345,388 355,335 365,388" fill="#a78bfa"/>
    <polygon points="358,392 370,348 382,392" fill="#c4b5fd"/>
    <polygon points="334,395 342,358 350,395" fill="#7c3aed"/>
  </g>

  <!-- Crystal glow effects -->
  <ellipse cx="90"  cy="370" rx="20" ry="20" fill="#a78bfa" opacity="0.18"/>
  <ellipse cx="360" cy="362" rx="20" ry="20" fill="#a78bfa" opacity="0.18"/>

  <!-- Floating magic particles -->
  <g fill="#c4b5fd">
    <circle cx="50"  cy="250" r="2.5" opacity="0.7"/>
    <circle cx="380" cy="220" r="2"   opacity="0.6"/>
    <circle cx="160" cy="200" r="2"   opacity="0.65"/>
    <circle cx="300" cy="240" r="2.5" opacity="0.7"/>
    <circle cx="220" cy="290" r="3"   opacity="0.5"/>
    <circle cx="130" cy="310" r="2"   opacity="0.6"/>
    <circle cx="310" cy="300" r="2"   opacity="0.6"/>
  </g>

  <!-- Mystical path glow -->
  <path d="M 180 570 Q 195 500 210 430 Q 225 360 215 290" stroke="rgba(167,139,250,0.2)" stroke-width="22" fill="none" stroke-linecap="round"/>
</svg>
