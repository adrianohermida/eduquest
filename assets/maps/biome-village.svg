<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 570" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky-v" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef9c3"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="ground-v" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="440" height="570" fill="url(#sky-v)"/>

  <!-- Clouds -->
  <g opacity="0.55">
    <ellipse cx="80" cy="70" rx="50" ry="22" fill="white"/>
    <ellipse cx="105" cy="58" rx="34" ry="22" fill="white"/>
    <ellipse cx="55" cy="62" rx="30" ry="18" fill="white"/>
  </g>
  <g opacity="0.45">
    <ellipse cx="310" cy="90" rx="45" ry="20" fill="white"/>
    <ellipse cx="335" cy="79" rx="30" ry="20" fill="white"/>
    <ellipse cx="288" cy="84" rx="28" ry="16" fill="white"/>
  </g>

  <!-- Distant rolling hills -->
  <ellipse cx="110" cy="280" rx="200" ry="80" fill="#f59e0b" opacity="0.35"/>
  <ellipse cx="360" cy="270" rx="160" ry="70" fill="#f59e0b" opacity="0.3"/>

  <!-- Wheat fields (horizontal line pattern) -->
  <g opacity="0.3">
    <line x1="30" y1="360" x2="200" y2="360" stroke="#d97706" stroke-width="2" stroke-dasharray="8 6"/>
    <line x1="30" y1="370" x2="195" y2="370" stroke="#d97706" stroke-width="2" stroke-dasharray="8 6"/>
    <line x1="30" y1="380" x2="205" y2="380" stroke="#d97706" stroke-width="2" stroke-dasharray="8 6"/>
    <line x1="30" y1="390" x2="200" y2="390" stroke="#d97706" stroke-width="2" stroke-dasharray="8 6"/>
    <line x1="240" y1="355" x2="420" y2="355" stroke="#d97706" stroke-width="2" stroke-dasharray="8 6"/>
    <line x1="240" y1="365" x2="415" y2="365" stroke="#d97706" stroke-width="2" stroke-dasharray="8 6"/>
    <line x1="240" y1="375" x2="420" y2="375" stroke="#d97706" stroke-width="2" stroke-dasharray="8 6"/>
    <line x1="240" y1="385" x2="415" y2="385" stroke="#d97706" stroke-width="2" stroke-dasharray="8 6"/>
  </g>

  <!-- Ground base -->
  <ellipse cx="220" cy="500" rx="280" ry="120" fill="url(#ground-v)" opacity="0.65"/>
  <rect x="0" y="520" width="440" height="50" fill="#d97706" opacity="0.7"/>

  <!-- House 1 — left, small cottage -->
  <g opacity="0.5" transform="translate(30, 285)">
    <rect x="0" y="28" width="52" height="40" fill="#b45309"/>
    <polygon points="-6,28 26,0 58,28" fill="#92400e"/>
    <rect x="18" y="38" width="16" height="30" fill="#78350f"/>
    <rect x="4" y="34" width="12" height="12" fill="#fef9c3" opacity="0.8"/>
    <rect x="36" y="34" width="12" height="12" fill="#fef9c3" opacity="0.8"/>
  </g>
  <!-- Chimney smoke 1 -->
  <path d="M 68 280 Q 66 265 70 250 Q 74 235 68 220" stroke="#d1d5db" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.35"/>

  <!-- House 2 — right, larger farmhouse -->
  <g opacity="0.5" transform="translate(335, 270)">
    <rect x="0" y="30" width="70" height="50" fill="#b45309"/>
    <polygon points="-8,30 35,0 78,30" fill="#92400e"/>
    <rect x="25" y="40" width="20" height="40" fill="#78350f"/>
    <rect x="5" y="36" width="14" height="14" fill="#fef9c3" opacity="0.8"/>
    <rect x="51" y="36" width="14" height="14" fill="#fef9c3" opacity="0.8"/>
    <!-- Chimney -->
    <rect x="52" y="2" width="10" height="20" fill="#78350f"/>
  </g>
  <path d="M 393 258 Q 392 243 396 228 Q 400 213 394 198" stroke="#d1d5db" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.35"/>

  <!-- Round-top trees (village style) -->
  <g opacity="0.45">
    <!-- Tree cluster left -->
    <rect x="148" y="318" width="10" height="40" fill="#78350f" rx="2"/>
    <ellipse cx="153" cy="308" rx="24" ry="22" fill="#16a34a"/>
    <ellipse cx="153" cy="300" rx="18" ry="16" fill="#15803d"/>
    <!-- Tree cluster right -->
    <rect x="275" y="310" width="10" height="40" fill="#78350f" rx="2"/>
    <ellipse cx="280" cy="300" rx="24" ry="22" fill="#16a34a"/>
    <ellipse cx="280" cy="292" rx="18" ry="16" fill="#15803d"/>
  </g>

  <!-- Fence posts -->
  <g opacity="0.3">
    <line x1="100" y1="420" x2="100" y2="400" stroke="#78350f" stroke-width="3"/>
    <line x1="118" y1="420" x2="118" y2="400" stroke="#78350f" stroke-width="3"/>
    <line x1="136" y1="420" x2="136" y2="400" stroke="#78350f" stroke-width="3"/>
    <line x1="154" y1="420" x2="154" y2="400" stroke="#78350f" stroke-width="3"/>
    <line x1="100" y1="408" x2="154" y2="408" stroke="#78350f" stroke-width="2"/>
    <line x1="310" y1="415" x2="310" y2="395" stroke="#78350f" stroke-width="3"/>
    <line x1="328" y1="415" x2="328" y2="395" stroke="#78350f" stroke-width="3"/>
    <line x1="346" y1="415" x2="346" y2="395" stroke="#78350f" stroke-width="3"/>
    <line x1="310" y1="403" x2="346" y2="403" stroke="#78350f" stroke-width="2"/>
  </g>

  <!-- Path/road through center -->
  <path d="M 195 570 Q 210 500 220 420 Q 230 360 220 290" stroke="rgba(180,130,60,0.25)" stroke-width="20" fill="none" stroke-linecap="round"/>

  <!-- Sunflower hints -->
  <circle cx="95" cy="440" r="6" fill="#fbbf24" opacity="0.5"/>
  <circle cx="108" cy="435" r="5" fill="#fbbf24" opacity="0.5"/>
  <circle cx="340" cy="435" r="6" fill="#fbbf24" opacity="0.5"/>
</svg>
