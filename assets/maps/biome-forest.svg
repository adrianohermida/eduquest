<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 450" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bbf7d0"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
    <linearGradient id="hill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="river" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="440" height="450" fill="url(#sky)"/>

  <!-- Distant mountain silhouette -->
  <polygon points="0,230 60,130 120,200 180,110 250,190 310,100 380,170 440,140 440,260 0,260" fill="#16a34a" opacity="0.3"/>
  <polygon points="0,250 80,170 140,220 210,150 280,210 350,140 440,180 440,280 0,280" fill="#15803d" opacity="0.4"/>

  <!-- Mid ground hills -->
  <ellipse cx="100" cy="370" rx="160" ry="70" fill="url(#hill)" opacity="0.75"/>
  <ellipse cx="340" cy="360" rx="140" ry="65" fill="url(#hill)" opacity="0.7"/>
  <ellipse cx="220" cy="390" rx="200" ry="80" fill="#22c55e" opacity="0.6"/>

  <!-- Ground base -->
  <rect x="0" y="400" width="440" height="50" fill="#16a34a" opacity="0.8"/>

  <!-- River -->
  <path d="M 60 450 Q 90 420 110 390 Q 140 350 160 320 Q 180 300 200 450" fill="url(#river)" opacity="0.55"/>

  <!-- Background trees (left cluster) -->
  <g opacity="0.55">
    <polygon points="18,300 40,230 62,300" fill="#166534"/>
    <polygon points="12,318 40,238 68,318" fill="#15803d"/>
    <polygon points="6,335 40,248 74,335" fill="#14532d"/>
    <rect x="36" y="330" width="8" height="28" fill="#78350f" rx="2"/>
  </g>
  <!-- Taller center-left trees -->
  <g opacity="0.5">
    <polygon points="75,290 100,200 125,290" fill="#166534"/>
    <polygon points="70,312 100,210 130,312" fill="#15803d"/>
    <polygon points="65,332 100,220 135,332" fill="#14532d"/>
    <rect x="96" y="326" width="8" height="30" fill="#78350f" rx="2"/>
  </g>

  <!-- Background trees (right cluster) -->
  <g opacity="0.55">
    <polygon points="330,295 355,220 380,295" fill="#166534"/>
    <polygon points="325,315 355,230 385,315" fill="#15803d"/>
    <polygon points="320,333 355,240 390,333" fill="#14532d"/>
    <rect x="351" y="328" width="8" height="28" fill="#78350f" rx="2"/>
  </g>
  <g opacity="0.5">
    <polygon points="380,285 408,198 436,285" fill="#166534"/>
    <polygon points="375,308 408,208 441,308" fill="#15803d"/>
    <polygon points="370,328 408,218 446,328" fill="#14532d"/>
    <rect x="404" y="322" width="8" height="30" fill="#78350f" rx="2"/>
  </g>

  <!-- Small castle silhouette (distant, far back) -->
  <g opacity="0.22" transform="translate(185,100)">
    <rect x="0" y="30" width="70" height="50" fill="#1f2937"/>
    <rect x="5" y="18" width="18" height="28" fill="#1f2937"/>
    <rect x="47" y="18" width="18" height="28" fill="#1f2937"/>
    <rect x="28" y="5" width="14" height="35" fill="#1f2937"/>
    <!-- Crenels -->
    <rect x="5" y="12" width="5" height="8" fill="#1f2937"/>
    <rect x="14" y="12" width="5" height="8" fill="#1f2937"/>
    <rect x="47" y="12" width="5" height="8" fill="#1f2937"/>
    <rect x="56" y="12" width="5" height="8" fill="#1f2937"/>
  </g>

  <!-- Floating sparkles -->
  <circle cx="140" cy="150" r="2.5" fill="white" opacity="0.7"/>
  <circle cx="290" cy="130" r="2" fill="white" opacity="0.6"/>
  <circle cx="200" cy="90" r="3" fill="white" opacity="0.5"/>
  <circle cx="350" cy="200" r="2" fill="white" opacity="0.55"/>
  <circle cx="60" cy="180" r="2.5" fill="white" opacity="0.6"/>

  <!-- Bushes / ground shrubs -->
  <ellipse cx="165" cy="415" rx="22" ry="12" fill="#16a34a" opacity="0.6"/>
  <ellipse cx="280" cy="420" rx="18" ry="10" fill="#15803d" opacity="0.55"/>
  <ellipse cx="370" cy="408" rx="24" ry="14" fill="#166534" opacity="0.5"/>
</svg>
