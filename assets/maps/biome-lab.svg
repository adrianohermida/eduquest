<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 570" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#bae6fd"/>
    </linearGradient>
    <linearGradient id="water-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="440" height="570" fill="url(#sky-l)"/>

  <!-- Tech grid overlay -->
  <g opacity="0.08" stroke="#0284c7" stroke-width="1">
    <line x1="0" y1="80"  x2="440" y2="80"/>
    <line x1="0" y1="160" x2="440" y2="160"/>
    <line x1="0" y1="240" x2="440" y2="240"/>
    <line x1="0" y1="320" x2="440" y2="320"/>
    <line x1="80"  y1="0" x2="80"  y2="570"/>
    <line x1="160" y1="0" x2="160" y2="570"/>
    <line x1="240" y1="0" x2="240" y2="570"/>
    <line x1="320" y1="0" x2="320" y2="570"/>
    <line x1="400" y1="0" x2="400" y2="570"/>
  </g>

  <!-- Water channel / canal -->
  <path d="M 30 570 L 30 420 Q 40 400 60 390 L 160 390 Q 180 390 190 380 L 190 200" stroke="url(#water-l)" stroke-width="24" fill="none" stroke-linecap="round" opacity="0.55"/>
  <path d="M 30 570 L 30 420 Q 40 400 60 390 L 160 390 Q 180 390 190 380 L 190 200" stroke="rgba(186,230,253,0.4)" stroke-width="16" fill="none" stroke-linecap="round"/>

  <!-- City skyline — distant buildings -->
  <g opacity="0.22">
    <rect x="10"  y="200" width="32" height="180" fill="#0369a1"/>
    <rect x="14"  y="185" width="24" height="18" fill="#0369a1"/>
    <rect x="50"  y="220" width="28" height="160" fill="#0284c7"/>
    <rect x="86"  y="180" width="36" height="200" fill="#0369a1"/>
    <rect x="90"  y="160" width="28" height="22" fill="#0369a1"/>
    <rect x="310" y="195" width="34" height="185" fill="#0369a1"/>
    <rect x="348" y="210" width="28" height="170" fill="#0284c7"/>
    <rect x="380" y="175" width="40" height="205" fill="#0369a1"/>
    <rect x="386" y="155" width="28" height="22" fill="#0369a1"/>
  </g>

  <!-- Lab building (center, prominent) -->
  <g opacity="0.35" transform="translate(225,180)">
    <!-- Main building -->
    <rect x="0" y="0" width="100" height="140" fill="#0284c7"/>
    <!-- Windows grid -->
    <g fill="#e0f2fe" opacity="0.6">
      <rect x="8"  y="10" width="14" height="10" rx="1"/>
      <rect x="28" y="10" width="14" height="10" rx="1"/>
      <rect x="48" y="10" width="14" height="10" rx="1"/>
      <rect x="68" y="10" width="14" height="10" rx="1"/>
      <rect x="8"  y="28" width="14" height="10" rx="1"/>
      <rect x="28" y="28" width="14" height="10" rx="1"/>
      <rect x="48" y="28" width="14" height="10" rx="1"/>
      <rect x="68" y="28" width="14" height="10" rx="1"/>
      <rect x="8"  y="46" width="14" height="10" rx="1"/>
      <rect x="28" y="46" width="14" height="10" rx="1"/>
      <rect x="48" y="46" width="14" height="10" rx="1"/>
      <rect x="68" y="46" width="14" height="10" rx="1"/>
    </g>
    <!-- Roof antenna -->
    <line x1="50" y1="0" x2="50" y2="-25" stroke="#0369a1" stroke-width="3"/>
    <circle cx="50" cy="-28" r="5" fill="#38bdf8"/>
  </g>

  <!-- Flask/beaker shapes (decorative, lab icons) -->
  <g opacity="0.2" transform="translate(40,300)">
    <!-- Erlenmeyer flask -->
    <path d="M 12 0 L 12 25 L 0 50 L 30 50 L 18 25 L 18 0 Z" fill="#0ea5e9"/>
    <rect x="9" y="-4" width="12" height="6" rx="2" fill="#0369a1"/>
    <ellipse cx="15" cy="48" rx="15" ry="6" fill="#0284c7" opacity="0.7"/>
    <!-- Liquid bubbles -->
    <circle cx="8"  cy="38" r="3" fill="#7dd3fc" opacity="0.7"/>
    <circle cx="20" cy="42" r="2" fill="#7dd3fc" opacity="0.6"/>
    <circle cx="14" cy="33" r="2.5" fill="#7dd3fc" opacity="0.6"/>
  </g>

  <g opacity="0.2" transform="translate(390,290)">
    <path d="M 12 0 L 12 25 L 0 50 L 30 50 L 18 25 L 18 0 Z" fill="#0ea5e9"/>
    <rect x="9" y="-4" width="12" height="6" rx="2" fill="#0369a1"/>
    <ellipse cx="15" cy="48" rx="15" ry="6" fill="#0284c7" opacity="0.7"/>
  </g>

  <!-- Ground platform -->
  <ellipse cx="220" cy="500" rx="280" ry="100" fill="#bae6fd" opacity="0.4"/>
  <rect x="0" y="520" width="440" height="50" fill="#0284c7" opacity="0.3"/>

  <!-- Circuit trace decorations -->
  <g opacity="0.12" stroke="#0ea5e9" stroke-width="2" fill="none">
    <path d="M 0 480 H 80 V 450 H 140 V 430 H 220"/>
    <path d="M 440 490 H 360 V 460 H 300 V 440 H 220"/>
    <circle cx="80"  cy="450" r="4" fill="#0ea5e9"/>
    <circle cx="140" cy="430" r="4" fill="#0ea5e9"/>
    <circle cx="360" cy="460" r="4" fill="#0ea5e9"/>
    <circle cx="300" cy="440" r="4" fill="#0ea5e9"/>
  </g>

  <!-- Glow dots (tech ambiance) -->
  <circle cx="195" cy="175" r="3" fill="#38bdf8" opacity="0.6"/>
  <circle cx="330" cy="150" r="2" fill="#38bdf8" opacity="0.5"/>
  <circle cx="90"  cy="160" r="2.5" fill="#38bdf8" opacity="0.55"/>
  <circle cx="420" cy="200" r="2" fill="#7dd3fc" opacity="0.5"/>
</svg>
