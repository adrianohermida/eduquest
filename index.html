<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduQuest RPG</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* CSS Crítico para o Menu Mobile e Layout */
        body { margin: 0; font-family: sans-serif; background: #fffbeb; color: #1e293b; padding-bottom: 70px; }
        .mobile-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 2px solid #f97316; display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; }
        .nav-item { text-decoration: none; color: #94a3b8; text-align: center; font-size: 0.8rem; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: #f97316; font-weight: bold; }
        .nav-item span { font-size: 10px; margin-top: 2px; }
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .btn-primary { background: #f97316; color: white; border: none; padding: 15px 30px; border-radius: 12px; font-size: 1.1rem; cursor: pointer; width: 100%; margin-top: 20px; }
        .map-path { position: relative; padding: 20px 0; display: flex; flex-direction: column; align-items: center; gap: 40px; }
        .path-line { position: absolute; top: 0; bottom: 0; left: 50%; width: 4px; background: #fed7aa; transform: translateX(-50%); z-index: 0; }
        .map-node { width: 60px; height: 60px; background: white; border: 4px solid #f97316; border-radius: 50%; z-index: 1; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; box-shadow: 0 4px 0 #ea580c; }
        .map-node.locked { filter: grayscale(1); cursor: not-allowed; border-color: #cbd5e1; box-shadow: none; }
        .fade-in { animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hero { text-align: center; padding: 40px 0; }
        .title-glow { color: #f97316; font-size: 2.5rem; text-shadow: 0 0 10px rgba(249,115,22,0.5); }
        .stats-summary { background: #ffedd5; padding: 10px; border-radius: 8px; margin: 20px 0; display: inline-block; }
        .profile-card { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .avatar { font-size: 4rem; margin-bottom: 10px; }
        .progress-bar { width: 100%; height: 10px; background: #e2e8f0; border-radius: 5px; overflow: hidden; margin: 10px 0; }
        .fill { height: 100%; background: #f97316; }
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-top: 20px; }
        .item-card { background: white; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #e2e8f0; }
        .item-icon { font-size: 2.5rem; margin-bottom: 5px; }
        .btn-small { background: #f97316; color: white; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>

    <!-- Header HUD -->
    <div style="position: sticky; top: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(5px); padding: 10px 20px; border-bottom: 2px solid #f97316; display: flex; justify-content: space-between; z-index: 900;">
        <div style="font-weight: bold; color: #f97316;">⚡ <span id="hud-xp">0</span> XP</div>
        <div style="font-weight: bold; color: #f97316;">💎 <span id="hud-gems">0</span></div>
    </div>

    <!-- Container Principal -->
    <main id="app"></main>

    <!-- SCRIPTS NA ORDEM CORRETA -->
    <script src="js/state.js"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    
    <!-- Dados (Se falhar, o app continua rodando as telas básicas) -->
    <script src="js/questions.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/metadata.js"></script>
    <!-- Se os stages derem erro, comente-os temporariamente para testar o menu -->
    <!-- <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_01.js"></script> -->
    
    <script src="js/app.js"></script>
</body>
</html>
