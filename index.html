<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduQuest - Ciências Cap. 7</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Top Bar (Hearts, Streak, XP) -->
  <header class="top-bar">
    <div class="hearts" id="hearts-display">❤️❤️❤️❤️❤️</div>
    <div class="progress-container">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="streak" id="streak-display">🔥 0</div>
  </header>

  <!-- Game Area -->
  <main id="game-container" class="game-container">
    <!-- Content is injected here by JS -->
  </main>

  <!-- Footer / Check Button -->
  <footer class="footer-check">
    <div id="feedback-area" class="feedback-area hidden">
      <p id="feedback-text"></p>
    </div>
    <button id="check-btn" class="btn btn-primary" disabled>VERIFICAR</button>
  </footer>

  <script src="app.js"></script>
</body>
</html>
