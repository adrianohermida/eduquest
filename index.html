<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EduQuest | Evolua Jogando</title>
    <meta name="theme-color" content="#f97316">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Critical CSS inline para carregamento instantâneo */
        body { background: #0f172a; color: white; }
        #splash { display: flex; height: 100vh; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; color: #f97316; }
    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash">⚡ EDUQUEST</div>

    <!-- HUD Global -->
    <div id="hud-stats" style="display:none;">
        <!-- Preenchido via JS -->
    </div>

    <!-- App Container -->
    <main id="app"></main>

    <!-- Bottom Navigation (Mobile) -->
    <nav class="bottom-nav" id="bottom-nav" style="display:none;">
        <a href="#home" class="nav-item active">🏠</a>
        <a href="#leaderboard" class="nav-item">🏆</a>
        <a href="#profile" class="nav-item">👤</a>
    </nav>

    <!-- SCRIPTS (Ordem Crítica) -->
    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/utils.js"></script>
    
    <!-- Dados do Capítulo Ativo (Carregados sob demanda pelo App.js também, mas deixamos base aqui) -->
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/metadata.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/summaries.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_01.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_02.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_03.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_04.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_05.js"></script>
    <script src="js/questions.js"></script>

    <!-- Core Application -->
    <script src="js/app.js"></script>
    
    <!-- PWA Service Worker -->
    <script src="js/sw-register.js"></script>

    <script>
        // Remove splash screen quando o app iniciar
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash');
                if(splash) splash.style.display = 'none';
                document.getElementById('hud-stats').style.display = 'flex';
                document.getElementById('bottom-nav').style.display = 'flex';
            }, 800);
        });
    </script>
</body>
</html>
