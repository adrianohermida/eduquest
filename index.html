<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f97316">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="manifest.json">
    <title>EduQuest ⚡</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/modal-hud.css">
    <link rel="stylesheet" href="css/design-system-v3.css">
</head>
<body data-layout="app">

    <!-- Skip navigation (accessibility) -->
    <a class="skip-nav" href="#app-container">Pular para o conteúdo</a>

    <!-- Sidebar overlay (mobile/tablet drawer backdrop) -->
    <div class="sidebar-overlay" id="sidebar-overlay" role="presentation" aria-hidden="true"></div>

    <!-- Sidebar (populated by Sidebar.init()) -->
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Menu principal"></aside>

    <!-- HUD Superior -->
    <header class="top-hud" id="top-hud" role="banner">
        <div class="hud-left">
            <button
                class="hud-menu-btn"
                id="hud-menu-btn"
                onclick="Sidebar.toggle()"
                aria-label="Abrir menu de navegação"
                aria-controls="sidebar"
                aria-expanded="false"
            >☰</button>
            <div class="hud-avatar-wrap" id="hud-avatar-wrap">
                <button
                    id="hud-avatar-btn"
                    class="hud-avatar-btn"
                    onclick="HUD.toggleAvatarDropdown()"
                    aria-label="Ver perfil"
                    aria-expanded="false"
                    aria-controls="hud-avatar-dropdown"
                    title="Meu Perfil"
                >🦸</button>
                <div class="hud-avatar-dropdown" id="hud-avatar-dropdown" aria-hidden="true" role="menu">
                    <div class="had-user">
                        <span class="had-avatar" id="had-avatar">🦸</span>
                        <div class="had-info">
                            <div class="had-name" id="had-name">Herói</div>
                            <div class="had-lvl" id="had-lvl-txt">Nível 1</div>
                        </div>
                    </div>
                    <div class="had-stats-row">
                        <div class="had-stat"><span>⚡</span><span id="had-xp-val">0 XP</span></div>
                        <div class="had-stat"><span>🔥</span><span id="had-streak-val">1 dias</span></div>
                        <div class="had-stat"><span>💎</span><span id="had-gems-val">0</span></div>
                    </div>
                    <div class="had-divider"></div>
                    <a class="had-link" href="#profile"  onclick="HUD.closeAvatarDropdown()" role="menuitem">🦸 Meu Perfil</a>
                    <a class="had-link" href="#shop"     onclick="HUD.closeAvatarDropdown()" role="menuitem">🛒 Loja</a>
                    <a class="had-link" href="#ranking"  onclick="HUD.closeAvatarDropdown()" role="menuitem">🏆 Ranking</a>
                    <div class="had-divider"></div>
                    <button class="had-link had-logout" onclick="State.logoutAsync()" role="menuitem">🚪 Sair</button>
                </div>
            </div>
            <span class="hud-level-chip" id="hud-level" aria-label="Nível atual">Nv.1</span>
        </div>
        <div class="hud-stats" role="status" aria-label="Estatísticas do jogador">
            <div class="hud-chip streak-chip" aria-label="Sequência de dias">🔥<span id="hud-streak">1</span></div>
            <div class="hud-chip gem-chip"    aria-label="Gemas">💎<span id="hud-gems">0</span></div>
            <div class="hud-chip xp-chip"     aria-label="XP total">⚡<span id="hud-xp">0</span></div>
            <div class="hud-chip heart-chip"  aria-label="Vidas">❤️<span id="hud-hearts">5</span></div>
            <button
                id="mute-btn"
                class="hud-mute-btn"
                onclick="SoundManager.toggle()"
                aria-label="Alternar som"
                title="Som"
            >🔊</button>
        </div>
    </header>

    <!-- Main content -->
    <main id="app-container" class="app-container" role="main" tabindex="-1" aria-live="polite" aria-atomic="true"></main>

    <!-- Right Panel (desktop only, populated by Sidebar.init()) -->
    <aside class="right-panel" id="right-panel" role="complementary" aria-label="Painel de progresso"></aside>

    <!-- Bottom Navigation (mobile only) -->
    <nav class="bottom-nav" id="bottom-nav" role="navigation" aria-label="Navegação principal">
        <a href="#home" class="nav-tab" data-route="home" aria-label="Início">
            <div class="nav-tab-icon" aria-hidden="true">🗺️</div>
            <span class="nav-tab-label">Início</span>
        </a>
        <a href="#missions" class="nav-tab" data-route="missions" aria-label="Missões">
            <div class="nav-tab-icon" aria-hidden="true">⚔️</div>
            <span class="nav-tab-label">Missões</span>
        </a>
        <a href="#ranking" class="nav-tab" data-route="ranking" aria-label="Ranking">
            <div class="nav-tab-icon" aria-hidden="true">🏆</div>
            <span class="nav-tab-label">Ranking</span>
        </a>
        <a href="#profile" class="nav-tab" data-route="profile" aria-label="Perfil">
            <div class="nav-tab-icon" aria-hidden="true">🦸</div>
            <span class="nav-tab-label">Perfil</span>
        </a>
        <a href="#shop" class="nav-tab" data-route="shop" aria-label="Loja">
            <div class="nav-tab-icon" aria-hidden="true">🛒</div>
            <span class="nav-tab-label">Loja</span>
        </a>
    </nav>

    <!-- Scripts na ordem correta -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/sound-manager.js"></script>
    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/questions.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/metadata.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_01.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_02.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_03.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_04.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_05.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_06.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_07.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_08.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_09.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_10.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_boss.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_final.js"></script>
    <script src="js/ui-components.js"></script>
    <script src="js/game-engine.js"></script>
    <script src="js/mini-games/memory-game.js"></script>
    <script src="js/mini-games/forca.js"></script>
    <script src="js/mini-games/word-search.js"></script>
    <script src="js/adventure-map.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/modal-engine.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
    <script src="js/utils/no-native-dialogs.js"></script>
</body>
</html>
