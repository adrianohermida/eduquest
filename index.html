<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Missão Ciências – Multiáreas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">
  <header class="w-full bg-white shadow-sm px-4 py-3 flex items-center justify-between sticky top-0 z-40">
    <div class="flex items-center gap-3">
      <div class="bg-emerald-100 p-2 rounded-xl">🎓</div>
      <div>
        <h1 class="text-lg font-bold leading-tight tracking-tight">EduQuest</h1>
        <p id="subject-label" class="text-xs text-slate-500">Ciências – Cap. 7</p>
      </div>
    </div>
    <div class="flex items-center gap-4 text-sm font-semibold">
      <span class="text-purple-600 bg-purple-50 px-2 py-1 rounded-lg" id="xp-display">0 XP</span>
      <span class="flex items-center gap-1 text-rose-500" id="lives-display">❤️❤️❤️❤️❤️</span>
      <span class="flex items-center gap-1 text-orange-500" id="streak-display">🔥 0</span>
    </div>
  </header>

  <main id="app" class="w-full max-w-xl mx-auto px-4 py-6 flex-1 flex flex-col gap-4"></main>

  <div id="confetti-container" class="fixed inset-0 pointer-events-none z-50 overflow-hidden"></div>

  <script src="summaries.js"></script>
  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
