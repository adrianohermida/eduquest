<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#f97316">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>EduQuest ⚡</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- HUD Superior -->
    <header class="top-hud" id="top-hud">
        <button id="hud-avatar-btn" class="hud-avatar-btn" onclick="Router.navigate('#profile')" title="Perfil">🦸</button>
        <div class="hud-stats">
            <div class="hud-chip streak-chip">🔥<span id="hud-streak">1</span></div>
            <div class="hud-chip gem-chip">💎<span id="hud-gems">0</span></div>
            <div class="hud-chip xp-chip">⚡<span id="hud-xp">0</span></div>
            <div class="hud-chip heart-chip">❤️<span id="hud-hearts">5</span></div>
            <button id="mute-btn" class="hud-mute-btn" onclick="SoundManager.toggle()">🔊</button>
        </div>
    </header>

    <!-- Container Principal -->
    <main id="app-container" class="app-container"></main>

    <!-- Navegação Inferior -->
    <nav class="bottom-nav" id="bottom-nav">
        <a href="#home" class="nav-tab" data-route="home">
            <div class="nav-tab-icon">🗺️</div>
            <span class="nav-tab-label">Início</span>
        </a>
        <a href="#missions" class="nav-tab" data-route="missions">
            <div class="nav-tab-icon">⚔️</div>
            <span class="nav-tab-label">Missões</span>
        </a>
        <a href="#profile" class="nav-tab" data-route="profile">
            <div class="nav-tab-icon">🏅</div>
            <span class="nav-tab-label">Perfil</span>
        </a>
        <a href="#shop" class="nav-tab" data-route="shop">
            <div class="nav-tab-icon">🛒</div>
            <span class="nav-tab-label">Loja</span>
        </a>
    </nav>

    <!-- Scripts na ordem correta -->
    <!-- Supabase JS (UMD — expõe window.supabase) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/sound-manager.js"></script>
    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/questions.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/metadata.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_01.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_02.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_03.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_04.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_05.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_06.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_07.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_08.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_09.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_10.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_boss.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_final.js"></script>
    <script src="js/ui-components.js"></script>
    <script src="js/game-engine.js"></script>
    <script src="js/mini-games/memory-game.js"></script>
    <script src="js/mini-games/forca.js"></script>
    <script src="js/adventure-map.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
