<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EduQuest RPG</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- HUD Global -->
    <header class="hud-bar">
        <div class="brand">⚡ EduQuest</div>
        <div class="stats">
            <span class="badge">❤️ <b id="hud-hearts">5</b></span>
            <span class="badge">💎 <b id="hud-gems">0</b></span>
            <span class="badge">⚡ <b id="hud-xp">0</b></span>
        </div>
    </header>

    <!-- Container Principal -->
    <main id="app"></main>

    <!-- Menu Mobile Inferior -->
    <nav class="bottom-nav">
        <a href="#home" class="nav-item active">🏠<span>Início</span></a>
        <a href="#map/ciencias/7ano/cap7_doencas" class="nav-item">🗺️<span>Mapa</span></a>
        <a href="#profile" class="nav-item">👤<span>Perfil</span></a>
        <a href="#shop" class="nav-item">🛒<span>Loja</span></a>
    </nav>

    <!-- SCRIPTS (ORDEM CRÍTICA) -->
    <!-- 1. Core -->
    <script src="js/state.js"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    
    <!-- 2. Dados (Corrigidos para não usar export) -->
    <!-- Se estes arquivos derem erro, o app continua funcionando na Home -->
    <script src="js/questions.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/metadata.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/summaries.js"></script>

    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_03.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_04.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_05.js"></script>

    <!-- 3. App Engine (Último) -->
    <script src="js/app.js"></script>
</body>
</html>
