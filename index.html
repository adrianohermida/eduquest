<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Missão Ciências – Capítulo 7</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gradient-to-b from-slate-50 to-slate-100 text-slate-800 font-sans min-h-screen flex flex-col">
  <header class="w-full bg-white/95 backdrop-blur-sm shadow-sm px-4 py-3 flex items-center justify-between sticky top-0 z-50 border-b border-slate-200">
    <div class="flex items-center gap-3">
      <div class="bg-emerald-100 p-2 rounded-xl text-2xl">🔬</div>
      <div>
        <h1 class="text-lg font-bold leading-tight tracking-tight text-slate-900">Missão Ciências</h1>
        <p id="subject-label" class="text-xs text-slate-500 font-medium">Capítulo 7: Doenças Transmissíveis</p>
      </div>
    </div>
    <div class="flex items-center gap-3 text-sm font-semibold">
      <span class="text-purple-600 bg-purple-50 px-2.5 py-1 rounded-lg border border-purple-100" id="xp-display">0 XP</span>
      <span class="flex items-center gap-1 text-rose-500 bg-rose-50 px-2 py-1 rounded-lg border border-rose-100" id="lives-display">❤️❤️❤️❤️❤️</span>
      <span class="flex items-center gap-1 text-orange-500 bg-orange-50 px-2 py-1 rounded-lg border border-orange-100" id="streak-display">🔥 0</span>
    </div>
  </header>

  <main id="app" class="w-full max-w-xl mx-auto px-4 py-4 flex-1 flex flex-col gap-3"></main>

  <div id="confetti-container" class="fixed inset-0 pointer-events-none z-40 overflow-hidden"></div>

  <div id="modal-overlay" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
    <div id="modal-content" class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6 transform transition-all"></div>
  </div>

  <script src="summaries.js"></script>
  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
