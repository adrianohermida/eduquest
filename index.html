<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <meta name="theme-color" content="#f97316">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <link rel="icon" href="assets/icons/favicon.ico" sizes="32x32">
    <link rel="icon" href="assets/icons/genfavicon-32.png" sizes="32x32">
    <link rel="icon" href="assets/icons/genfavicon-16.png" sizes="16x16">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon-57x57.png" sizes="57x57">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon-114x114.png" sizes="114x114">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon-120x120.png" sizes="120x120">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon-180x180.png" sizes="180x180">
    <link rel="manifest" href="assets/icons/site.webmanifest">
    <title>EduQuest ⚡</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/modal-hud.css">
    <link rel="stylesheet" href="css/design-system-v3.css">
    <link rel="stylesheet" href="css/world-map.css">
    <link rel="stylesheet" href="css/hud-dropdowns.css">
    <link rel="stylesheet" href="css/icons.css">
    <link rel="stylesheet" href="css/social.css">
    <link rel="stylesheet" href="css/sprint5.css">
    <link rel="stylesheet" href="css/game-feel.css">
    <link rel="stylesheet" href="css/learning.css">
    <link rel="stylesheet" href="css/builder.css">
    <link rel="stylesheet" href="css/depth.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/spacing.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body data-layout="app">

    <!-- Skip navigation (accessibility) -->
    <a class="skip-nav" href="#app-container">Pular para o conteúdo</a>

    <!-- Sidebar overlay (mobile/tablet drawer backdrop) -->
    <div class="sidebar-overlay" id="sidebar-overlay" role="presentation" aria-hidden="true"></div>

    <!-- Sidebar (populated by Sidebar.init()) -->
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Menu principal"></aside>

    <!-- HUD Superior — Premium v2.0 -->
    <header class="top-hud" id="top-hud" role="banner">

        <!-- LEFT: hamburger · logo · level -->
        <div class="hud-left">
            <button
                class="hud-menu-btn"
                id="hud-menu-btn"
                onclick="Sidebar.toggle()"
                aria-label="Abrir menu de navegação"
                aria-controls="sidebar"
                aria-expanded="false"
            >☰</button>

            <a class="hud-brand" href="#home" aria-label="EduQuest — Início">
                <img src="assets/icons/icon-192.png" alt="" class="hud-brand-logo" aria-hidden="true">
                <span class="hud-brand-text">EduQuest</span>
            </a>

            <span class="hud-level-chip" id="hud-level" aria-label="Nível atual">Nv.1</span>
            <!-- Discipline selector — shown on tablet+, populated by HUD when chapter is active -->
            <div class="hud-chip-wrap hud-disc-wrap" id="hud-disc-wrap" style="display:none">
                <button class="hud-chip hud-disc-chip" id="hud-disc-btn"
                    onclick="HUD.toggleDropdown('discipline')"
                    aria-expanded="false"
                    aria-controls="hud-dd-discipline"
                    aria-label="Selecionar disciplina"
                ><span id="hud-disc-text">Ciências • 7º Ano</span> <span aria-hidden="true">▾</span></button>
                <div class="hud-dropdown" id="hud-dd-discipline" aria-hidden="true"></div>
            </div>
        </div>

        <!-- CENTER: context breadcrumb (tablet/desktop only) -->
        <div class="hud-context" id="hud-context" aria-live="polite"></div>

        <!-- RIGHT: interactive stat chips + notifications + avatar -->
        <div class="hud-stats" role="status" aria-label="Estatísticas do jogador">

            <!-- Streak -->
            <div class="hud-chip-wrap hud-streak-wrap" id="hud-streak-wrap">
                <button class="hud-chip streak-chip" id="hud-streak-btn"
                    onclick="HUD.toggleDropdown('streak')"
                    aria-label="Sequência de dias"
                    aria-expanded="false"
                    aria-controls="hud-dd-streak"
                >🔥<span id="hud-streak">1</span><span class="hud-chip-lbl">Sequência</span></button>
                <div class="hud-dropdown" id="hud-dd-streak" aria-hidden="true"></div>
            </div>

            <!-- Gems -->
            <div class="hud-chip-wrap hud-gems-wrap" id="hud-gems-wrap">
                <button class="hud-chip gem-chip" id="hud-gems-btn"
                    onclick="HUD.toggleDropdown('gems')"
                    aria-label="Gemas"
                    aria-expanded="false"
                    aria-controls="hud-dd-gems"
                >💎<span id="hud-gems">0</span><span class="hud-chip-lbl">Gemas</span></button>
                <div class="hud-dropdown" id="hud-dd-gems" aria-hidden="true"></div>
            </div>

            <!-- XP -->
            <div class="hud-chip-wrap hud-xp-wrap" id="hud-xp-wrap">
                <button class="hud-chip xp-chip" id="hud-xp-btn"
                    onclick="HUD.toggleDropdown('xp')"
                    aria-label="XP total"
                    aria-expanded="false"
                    aria-controls="hud-dd-xp"
                >⚡<span id="hud-xp">0</span><span class="hud-chip-lbl">XP</span></button>
                <div class="hud-dropdown" id="hud-dd-xp" aria-hidden="true"></div>
            </div>

            <!-- Hearts -->
            <div class="hud-chip-wrap hud-hearts-wrap" id="hud-hearts-wrap">
                <button class="hud-chip heart-chip" id="hud-hearts-btn"
                    onclick="HUD.toggleDropdown('hearts')"
                    aria-label="Vidas"
                    aria-expanded="false"
                    aria-controls="hud-dd-hearts"
                >❤️<span id="hud-hearts">5</span><span class="hud-chip-lbl">Vidas</span></button>
                <div class="hud-dropdown" id="hud-dd-hearts" aria-hidden="true"></div>
            </div>

            <!-- Notifications -->
            <div class="hud-chip-wrap" id="hud-notif-wrap">
                <button class="hud-notif-btn" id="hud-notif-btn"
                    onclick="HUD.toggleDropdown('notifications')"
                    aria-label="Notificações"
                    aria-expanded="false"
                    aria-controls="hud-dd-notifications"
                >🔔<span class="hud-notif-badge" id="hud-notif-badge" style="display:none">0</span></button>
                <div class="hud-dropdown" id="hud-dd-notifications" aria-hidden="true"></div>
            </div>

            <!-- Avatar + dropdown -->
            <div class="hud-avatar-wrap" id="hud-avatar-wrap">
                <button
                    id="hud-avatar-btn"
                    class="hud-avatar-btn"
                    onclick="HUD.toggleAvatarDropdown()"
                    aria-label="Ver perfil"
                    aria-expanded="false"
                    aria-controls="hud-avatar-dropdown"
                    title="Meu Perfil"
                >🦸</button>
                <div class="hud-avatar-dropdown" id="hud-avatar-dropdown" aria-hidden="true" role="menu">
                    <div class="had-user">
                        <span class="had-avatar" id="had-avatar">🦸</span>
                        <div class="had-info">
                            <div class="had-name" id="had-name">Herói</div>
                            <div class="had-lvl" id="had-lvl-txt">Nível 1</div>
                        </div>
                    </div>
                    <div class="had-stats-row">
                        <div class="had-stat"><span>⚡</span><span id="had-xp-val">0 XP</span></div>
                        <div class="had-stat"><span>🔥</span><span id="had-streak-val">1 dias</span></div>
                        <div class="had-stat"><span>💎</span><span id="had-gems-val">0</span></div>
                    </div>
                    <div class="had-divider"></div>
                    <a class="had-link" href="#profile"      onclick="HUD.closeAvatarDropdown()" role="menuitem">🦸 Meu Perfil</a>
                    <a class="had-link" href="#achievements" onclick="HUD.closeAvatarDropdown()" role="menuitem">🏅 Conquistas</a>
                    <a class="had-link" href="#shop"         onclick="HUD.closeAvatarDropdown()" role="menuitem">🛒 Loja</a>
                    <a class="had-link" href="#ranking"      onclick="HUD.closeAvatarDropdown()" role="menuitem">🏆 Ranking</a>
                    <a class="had-link" href="#events"       onclick="HUD.closeAvatarDropdown()" role="menuitem">⚡ Eventos</a>
                    <a class="had-link" href="#battle-pass"  onclick="HUD.closeAvatarDropdown()" role="menuitem">👑 Battle Pass</a>
                    <a class="had-link" href="#ai-studio"    onclick="HUD.closeAvatarDropdown()" role="menuitem">🤖 AI Studio</a>
                    <a class="had-link" href="#pvp"          onclick="HUD.closeAvatarDropdown()" role="menuitem">⚔️ Batalhas PvP</a>
                    <div class="had-divider"></div>
                    <a class="had-link had-admin" href="#admin" onclick="HUD.closeAvatarDropdown()" role="menuitem" id="had-admin-link" style="display:none">🛡️ Admin Dashboard</a>
                    <div class="had-divider" id="had-admin-div" style="display:none"></div>
                    <button class="had-link" onclick="HUD.toggleLayoutPref()" role="menuitem">
                        <span id="hud-pref-icon">🖥️</span>
                        <span id="hud-pref-label">Modo Compacto</span>
                        <span class="had-pref-badge" id="hud-pref-badge">ATIVO</span>
                    </button>
                    <div class="had-divider"></div>
                    <button class="had-link had-logout" onclick="State.logoutAsync()" role="menuitem">🚪 Sair</button>
                </div>
            </div>

        </div>
    </header>

    <!-- Main content -->
    <main id="app-container" class="app-container" role="main" tabindex="-1" aria-live="polite" aria-atomic="true"></main>

    <!-- Right Panel (desktop only, populated by Sidebar.init()) -->
    <aside class="right-panel" id="right-panel" role="complementary" aria-label="Painel de progresso"></aside>

    <!-- Bottom Navigation (mobile only) -->
    <nav class="bottom-nav" id="bottom-nav" role="navigation" aria-label="Navegação principal">
        <a href="#home" class="nav-tab" data-route="home" aria-label="Início">
            <div class="nav-tab-icon" aria-hidden="true">🗺️</div>
            <span class="nav-tab-label">Início</span>
        </a>
        <a href="#missions" class="nav-tab" data-route="missions" aria-label="Missões">
            <div class="nav-tab-icon" aria-hidden="true">⚔️</div>
            <span class="nav-tab-label">Missões</span>
        </a>
        <a href="#ranking" class="nav-tab" data-route="ranking" aria-label="Ranking">
            <div class="nav-tab-icon" aria-hidden="true">🏆</div>
            <span class="nav-tab-label">Ranking</span>
        </a>
        <a href="#profile" class="nav-tab" data-route="profile" aria-label="Perfil">
            <div class="nav-tab-icon" aria-hidden="true">🦸</div>
            <span class="nav-tab-label">Perfil</span>
        </a>
        <a href="#shop" class="nav-tab" data-route="shop" aria-label="Loja">
            <div class="nav-tab-icon" aria-hidden="true">🛒</div>
            <span class="nav-tab-label">Loja</span>
        </a>
    </nav>

    <!-- Scripts na ordem correta -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/sound-manager.js"></script>
    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/questions.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/metadata.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_01.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_02.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_03.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_04.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_05.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_06.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_07.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_08.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_09.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_10.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_boss.js"></script>
    <script src="js/data/ciencias/7ano/chapters/cap7_doencas/stages/stage_final.js"></script>
    <script src="js/ui-components.js"></script>
    <script src="js/game-engine.js"></script>
    <script src="js/focus-engine.js"></script>
    <script src="js/flashcard-engine.js"></script>
    <script src="js/memory-engine.js"></script>
    <script src="js/mini-games/memory-game.js"></script>
    <script src="js/mini-games/speed-drill.js"></script>
    <script src="js/mini-games/forca.js"></script>
    <script src="js/mini-games/word-search.js"></script>
    <script src="src/adventure-map-engine/biome-generator.js"></script>
    <script src="src/adventure-map-engine/path-generator.js"></script>
    <script src="src/adventure-map-engine/node-system.js"></script>

    <script src="src/adventure-map-engine/ambient-system.js"></script>
    <script src="src/adventure-map-engine/map-camera.js"></script>
    <script src="src/adventure-map-engine/node-animations.js"></script>
    <script src="src/adventure-map-engine/world-renderer.js"></script>
    <script src="js/adventure-map.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/modal-engine.js"></script>
    <script src="js/router.js"></script>
    <script src="js/social-engine.js"></script>
    <script src="js/events-engine.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="js/ai-studio.js"></script>
    <script src="js/builder.js"></script>
    <script src="js/icon-system.js"></script>
    <script src="src/motion/motion-tokens.js"></script>
    <script src="src/motion/transitions.js"></script>
    <script src="src/motion/springs.js"></script>
    <script src="src/motion/tactile-engine.js"></script>
    <script src="src/motion/ui-animations.js"></script>
    <script src="src/motion/feedback.js"></script>
    <script src="src/admin/admin.js"></script>
    <script src="js/session-guard.js"></script>
    <script src="js/app.js"></script>
    <script src="js/utils/no-native-dialogs.js"></script>
</body>
</html>
